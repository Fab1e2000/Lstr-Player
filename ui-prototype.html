<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lstr Player UI Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141518;
      --text: #f3f0ea;
      --muted: #a8a39a;
      --line: rgba(255, 255, 255, 0.14);
      --glass: rgba(255, 255, 255, 0.11);
      --glass-strong: rgba(255, 255, 255, 0.17);
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      --accent: #a8d8bd;
      --warm: #d8b27b;
      --blue: #8fc7dd;
      --rose: #d99eaa;
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(168, 216, 189, 0.20), transparent 34%),
        radial-gradient(circle at 78% 18%, rgba(216, 178, 123, 0.15), transparent 36%),
        linear-gradient(135deg, #151619, #24201d 52%, #121820);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 88%);
    }

    button {
      appearance: none;
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app {
      position: relative;
      height: 100vh;
      padding: 18px;
    }

    .shell {
      position: relative;
      height: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 22, 24, 0.54);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px) saturate(145%);
    }

    .titlebar {
      position: absolute;
      z-index: 20;
      inset: 0 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(20, 21, 23, 0.22);
      backdrop-filter: blur(18px);
    }

    .traffic {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 84px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .red { background: #ff5f57; }
    .yellow { background: #ffbd2e; }
    .green { background: #28c840; }

    .brand {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0;
      color: rgba(255, 255, 255, 0.72);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 84px;
      gap: 8px;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(150%);
      transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .icon-button:hover {
      background: var(--glass-strong);
      border-color: rgba(255, 255, 255, 0.24);
      transform: translateY(-1px);
    }

    .icon-button:active {
      transform: translateY(0) scale(0.98);
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .view {
      position: absolute;
      inset: 56px 0 0;
      padding: 30px;
      transition: transform 460ms cubic-bezier(.2, .86, .2, 1), opacity 300ms ease;
    }

    .view[hidden] {
      display: block;
      opacity: 0;
      pointer-events: none;
      transform: translateX(24px) scale(0.99);
    }

    .view.exit-left {
      transform: translateX(-24px) scale(0.99);
      opacity: 0;
    }

    .library-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin: 0 0 24px;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 29px;
      line-height: 1.1;
      font-weight: 700;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .search {
      width: min(320px, 38vw);
      height: 38px;
      padding: 0 12px 0 36px;
      color: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      outline: none;
      background:
        url("data:image/svg+xml,%3Csvg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.58)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.3-4.3'/%3E%3C/svg%3E") 11px 50% / 16px no-repeat,
        rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(18px);
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 22px;
      overflow: auto;
      height: calc(100vh - 172px);
      padding: 2px 4px 28px 2px;
      scrollbar-width: thin;
    }

    .album-card {
      min-width: 0;
      text-align: left;
      background: transparent;
    }

    .album-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .album-card:hover .album-cover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.26);
      box-shadow: 0 22px 46px rgba(0, 0, 0, 0.30);
    }

    .album-card:active .album-cover {
      transform: translateY(-1px) scale(0.99);
    }

    .cover-art {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transform: scale(1.04);
    }

    .cover-art::before,
    .cover-art::after {
      content: "";
      position: absolute;
    }

    .cover-art::before {
      inset: 16%;
      border: 1px solid rgba(255, 255, 255, 0.33);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.10);
      box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.08);
    }

    .cover-art::after {
      width: 21%;
      height: 21%;
      border-radius: 50%;
      background: rgba(20, 21, 23, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .cover-aurora { background: linear-gradient(135deg, #24332b, #a8d8bd 45%, #d8b27b); }
    .cover-night { background: linear-gradient(150deg, #101a22, #8fc7dd 48%, #d99eaa); }
    .cover-room { background: linear-gradient(135deg, #2b2520, #d8b27b 50%, #8fc7dd); }
    .cover-rain { background: linear-gradient(145deg, #172229, #7eb7a0 48%, #e4d3b0); }
    .cover-echo { background: linear-gradient(135deg, #261d24, #d99eaa 46%, #a8d8bd); }
    .cover-field { background: linear-gradient(140deg, #1d251b, #b7d58a 48%, #d8b27b); }

    .album-title {
      margin-top: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 650;
    }

    .album-subtitle {
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .player-layout {
      display: grid;
      grid-template-columns: minmax(270px, 34vw) minmax(320px, 1fr);
      gap: 30px;
      height: 100%;
      align-items: stretch;
    }

    .album-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }

    .back-row {
      height: 36px;
      display: flex;
      align-items: center;
    }

    .hero-cover {
      width: min(100%, 430px);
      aspect-ratio: 1;
      overflow: hidden;
      align-self: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
    }

    .hero-cover .cover-art {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .album-info h2 {
      font-size: 24px;
      line-height: 1.15;
    }

    .track-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(24px) saturate(150%);
    }

    .track-header {
      display: grid;
      grid-template-columns: 48px 1fr 74px;
      gap: 8px;
      padding: 14px 18px 10px;
      color: rgba(255, 255, 255, 0.52);
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .track-list {
      min-height: 0;
      overflow: auto;
      padding: 7px;
      scrollbar-width: thin;
    }

    .track {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 42px 1fr 74px;
      gap: 8px;
      align-items: center;
      padding: 0 11px;
      text-align: left;
      border-radius: 8px;
      background: transparent;
      transition: background 160ms ease;
    }

    .track:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .track.active {
      background: rgba(168, 216, 189, 0.16);
    }

    .track-number {
      color: rgba(255, 255, 255, 0.48);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .track.active .track-number {
      color: var(--accent);
    }

    .track-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 560;
    }

    .duration {
      color: rgba(255, 255, 255, 0.54);
      text-align: right;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .control-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 13px 16px 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(12, 13, 15, 0.18);
    }

    .progress-wrap {
      min-width: 0;
      display: grid;
      grid-template-columns: 46px minmax(110px, 1fr) 46px;
      gap: 10px;
      align-items: center;
    }

    .time {
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .time:last-child {
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .player-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .primary {
      width: 40px;
      height: 40px;
      color: #17201a;
      background: rgba(168, 216, 189, 0.92);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .primary:hover {
      background: rgba(190, 232, 205, 0.96);
    }

    .mode-on {
      color: var(--accent);
      border-color: rgba(168, 216, 189, 0.36);
      background: rgba(168, 216, 189, 0.15);
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 420ms;
      animation-timing-function: cubic-bezier(.2, .86, .2, 1);
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        padding: 10px;
      }

      .shell {
        min-height: calc(100vh - 20px);
        overflow: visible;
      }

      .view {
        position: relative;
        inset: auto;
        padding: 74px 16px 18px;
      }

      .album-grid {
        height: auto;
        grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
        gap: 16px;
      }

      .library-header {
        align-items: stretch;
        flex-direction: column;
      }

      .search {
        width: 100%;
      }

      .player-layout {
        grid-template-columns: 1fr;
      }

      .hero-cover {
        width: min(100%, 340px);
        justify-self: center;
      }

      .control-bar {
        grid-template-columns: 1fr;
      }

      .player-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="Lstr Player">
      <header class="titlebar">
        <div class="traffic" aria-hidden="true">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <div class="brand">Lstr Player</div>
        <div class="toolbar">
          <button class="icon-button" type="button" title="搜索" aria-label="搜索">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          </button>
        </div>
      </header>

      <section id="libraryView" class="view" aria-label="专辑选择页面">
        <div class="library-header">
          <div>
            <h1>专辑</h1>
            <div class="meta">6 个本地专辑</div>
          </div>
          <input id="searchInput" class="search" type="search" placeholder="搜索专辑" aria-label="搜索专辑">
        </div>
        <div id="albumGrid" class="album-grid"></div>
      </section>

      <section id="playerView" class="view" aria-label="播放界面" hidden>
        <div class="player-layout">
          <aside class="album-panel">
            <div class="back-row">
              <button id="backButton" class="icon-button" type="button" title="返回专辑" aria-label="返回专辑">
                <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
              </button>
            </div>
            <div id="heroCover" class="hero-cover"></div>
            <div class="album-info">
              <h2 id="playerTitle"></h2>
              <div id="playerSubtitle" class="meta"></div>
            </div>
          </aside>

          <section class="track-panel" aria-label="歌曲播放条目">
            <div class="track-header" aria-hidden="true">
              <span>#</span>
              <span>标题</span>
              <span>时长</span>
            </div>
            <div id="trackList" class="track-list"></div>
            <footer class="control-bar">
              <div class="progress-wrap">
                <span id="elapsedTime" class="time">0:00</span>
                <input id="progress" type="range" min="0" max="100" value="0" aria-label="播放进度">
                <span id="totalTime" class="time">0:00</span>
              </div>
              <div class="player-buttons">
                <button id="modeButton" class="icon-button" type="button" title="列表播放" aria-label="列表播放">
                  <svg id="modeIcon" viewBox="0 0 24 24"><path d="m17 2 4 4-4 4"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><path d="m7 22-4-4 4-4"></path><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></svg>
                </button>
                <button id="prevButton" class="icon-button" type="button" title="上一首" aria-label="上一首">
                  <svg viewBox="0 0 24 24"><path d="m19 20-9-8 9-8v16Z"></path><path d="M5 19V5"></path></svg>
                </button>
                <button id="playButton" class="icon-button primary" type="button" title="播放" aria-label="播放">
                  <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7Z"></path></svg>
                </button>
                <button id="nextButton" class="icon-button" type="button" title="下一首" aria-label="下一首">
                  <svg viewBox="0 0 24 24"><path d="m5 4 9 8-9 8V4Z"></path><path d="M19 5v14"></path></svg>
                </button>
              </div>
            </footer>
          </section>
        </div>
      </section>
    </section>
  </main>

  <script>
    const albums = [
      {
        title: "After Rain",
        artist: "Mizuki Studio",
        cover: "cover-rain",
        tracks: [
          ["雨后房间", 278],
          ["窗边低语", 332],
          ["玻璃杯里的光", 241],
          ["夜半整理", 418]
        ]
      },
      {
        title: "Lunar Sketches",
        artist: "Northline",
        cover: "cover-night",
        tracks: [
          ["Moon Gate", 214],
          ["Small Orbit", 196],
          ["Quiet Signal", 249],
          ["Sleep Map", 305]
        ]
      },
      {
        title: "Tea Room Voice",
        artist: "Aoi Works",
        cover: "cover-room",
        tracks: [
          ["入店铃声", 145],
          ["靠窗座位", 712],
          ["茶香和耳语", 964],
          ["晚安之前", 520]
        ]
      },
      {
        title: "Green Archive",
        artist: "Lstr Collection",
        cover: "cover-field",
        tracks: [
          ["Field Note 01", 188],
          ["Field Note 02", 206],
          ["Field Note 03", 232],
          ["Field Note 04", 260]
        ]
      },
      {
        title: "Soft Echo",
        artist: "Mellow Room",
        cover: "cover-echo",
        tracks: [
          ["声の輪郭", 301],
          ["遠い返事", 347],
          ["近づく足音", 280],
          ["余韻", 222]
        ]
      },
      {
        title: "Aurora Miniatures",
        artist: "Haru Tone",
        cover: "cover-aurora",
        tracks: [
          ["First Pale Line", 176],
          ["Mist Waltz", 203],
          ["Warm Horizon", 229],
          ["Last Light", 251]
        ]
      }
    ];

    const libraryView = document.getElementById("libraryView");
    const playerView = document.getElementById("playerView");
    const albumGrid = document.getElementById("albumGrid");
    const trackList = document.getElementById("trackList");
    const heroCover = document.getElementById("heroCover");
    const playerTitle = document.getElementById("playerTitle");
    const playerSubtitle = document.getElementById("playerSubtitle");
    const playButton = document.getElementById("playButton");
    const playIcon = document.getElementById("playIcon");
    const modeButton = document.getElementById("modeButton");
    const modeIcon = document.getElementById("modeIcon");
    const progress = document.getElementById("progress");
    const elapsedTime = document.getElementById("elapsedTime");
    const totalTime = document.getElementById("totalTime");
    const searchInput = document.getElementById("searchInput");

    let currentAlbum = albums[0];
    let currentTrackIndex = 0;
    let isPlaying = false;
    let loopOne = false;
    let progressTimer = null;
    let seconds = 0;

    function coverElement(className) {
      const wrap = document.createElement("div");
      wrap.className = `cover-art ${className}`;
      return wrap;
    }

    function formatTime(value) {
      const minutes = Math.floor(value / 60);
      const secs = Math.floor(value % 60).toString().padStart(2, "0");
      return `${minutes}:${secs}`;
    }

    function renderAlbums(list = albums) {
      albumGrid.innerHTML = "";
      for (const album of list) {
        const button = document.createElement("button");
        button.className = "album-card";
        button.type = "button";
        button.setAttribute("aria-label", album.title);

        const cover = document.createElement("div");
        cover.className = "album-cover";
        cover.appendChild(coverElement(album.cover));

        const title = document.createElement("div");
        title.className = "album-title";
        title.textContent = album.title;

        const subtitle = document.createElement("div");
        subtitle.className = "album-subtitle";
        subtitle.textContent = `${album.artist} · ${album.tracks.length} 首`;

        button.append(cover, title, subtitle);
        button.addEventListener("click", () => openAlbum(album));
        albumGrid.appendChild(button);
      }
    }

    function renderPlayer() {
      heroCover.innerHTML = "";
      heroCover.appendChild(coverElement(currentAlbum.cover));
      playerTitle.textContent = currentAlbum.title;
      playerSubtitle.textContent = `${currentAlbum.artist} · ${currentAlbum.tracks.length} 首`;
      trackList.innerHTML = "";

      currentAlbum.tracks.forEach((track, index) => {
        const row = document.createElement("button");
        row.className = `track ${index === currentTrackIndex ? "active" : ""}`;
        row.type = "button";
        row.setAttribute("aria-label", track[0]);
        row.innerHTML = `
          <span class="track-number">${String(index + 1).padStart(2, "0")}</span>
          <span class="track-name">${track[0]}</span>
          <span class="duration">${formatTime(track[1])}</span>
        `;
        row.addEventListener("click", () => {
          currentTrackIndex = index;
          seconds = 0;
          isPlaying = true;
          renderPlayer();
          syncPlayback();
        });
        trackList.appendChild(row);
      });

      const duration = currentAlbum.tracks[currentTrackIndex][1];
      totalTime.textContent = formatTime(duration);
      elapsedTime.textContent = formatTime(seconds);
      progress.value = Math.min(100, (seconds / duration) * 100);
      syncIcons();
    }

    function withTransition(update) {
      if (document.startViewTransition) {
        document.startViewTransition(update);
      } else {
        update();
      }
    }

    function openAlbum(album) {
      currentAlbum = album;
      currentTrackIndex = 0;
      seconds = 0;
      isPlaying = false;
      withTransition(() => {
        renderPlayer();
        libraryView.classList.add("exit-left");
        playerView.hidden = false;
        requestAnimationFrame(() => {
          playerView.hidden = false;
          libraryView.hidden = true;
          libraryView.classList.remove("exit-left");
        });
      });
    }

    function backToLibrary() {
      isPlaying = false;
      syncPlayback();
      withTransition(() => {
        libraryView.hidden = false;
        playerView.hidden = true;
      });
    }

    function syncIcons() {
      playButton.title = isPlaying ? "暂停" : "播放";
      playButton.setAttribute("aria-label", isPlaying ? "暂停" : "播放");
      playIcon.innerHTML = isPlaying
        ? '<path d="M8 5v14"></path><path d="M16 5v14"></path>'
        : '<path d="M8 5v14l11-7-11-7Z"></path>';

      modeButton.title = loopOne ? "单曲循环" : "列表播放";
      modeButton.setAttribute("aria-label", loopOne ? "单曲循环" : "列表播放");
      modeButton.classList.toggle("mode-on", loopOne);
      modeIcon.innerHTML = loopOne
        ? '<path d="m17 2 4 4-4 4"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><path d="m7 22-4-4 4-4"></path><path d="M21 13v1a4 4 0 0 1-4 4H3"></path><path d="M11 10h1v5"></path>'
        : '<path d="m17 2 4 4-4 4"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><path d="m7 22-4-4 4-4"></path><path d="M21 13v1a4 4 0 0 1-4 4H3"></path>';
    }

    function syncPlayback() {
      clearInterval(progressTimer);
      progressTimer = null;
      syncIcons();
      if (!isPlaying) return;

      progressTimer = setInterval(() => {
        const duration = currentAlbum.tracks[currentTrackIndex][1];
        seconds += 1;
        if (seconds >= duration) {
          if (loopOne) {
            seconds = 0;
          } else {
            currentTrackIndex = (currentTrackIndex + 1) % currentAlbum.tracks.length;
            seconds = 0;
            renderPlayer();
          }
        }
        elapsedTime.textContent = formatTime(seconds);
        progress.value = Math.min(100, (seconds / duration) * 100);
      }, 1000);
    }

    function changeTrack(offset) {
      currentTrackIndex = (currentTrackIndex + offset + currentAlbum.tracks.length) % currentAlbum.tracks.length;
      seconds = 0;
      renderPlayer();
      syncPlayback();
    }

    playButton.addEventListener("click", () => {
      isPlaying = !isPlaying;
      syncPlayback();
    });

    modeButton.addEventListener("click", () => {
      loopOne = !loopOne;
      syncIcons();
    });

    document.getElementById("prevButton").addEventListener("click", () => changeTrack(-1));
    document.getElementById("nextButton").addEventListener("click", () => changeTrack(1));
    document.getElementById("backButton").addEventListener("click", backToLibrary);

    progress.addEventListener("input", () => {
      const duration = currentAlbum.tracks[currentTrackIndex][1];
      seconds = Math.round((Number(progress.value) / 100) * duration);
      elapsedTime.textContent = formatTime(seconds);
    });

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();
      const results = albums.filter(album => {
        return album.title.toLowerCase().includes(query) || album.artist.toLowerCase().includes(query);
      });
      renderAlbums(results);
    });

    renderAlbums();
    renderPlayer();
  </script>
</body>
</html>
